name: Release

# Publishes all public workspace packages to npm when a version tag is pushed.
# Requires the NPM_TOKEN repository secret (npm automation token).
#
#   npm version 0.2.0 --workspaces --no-git-tag-version  # bump versions
#   git commit -am "chore: release v0.2.0" && git tag v0.2.0
#   git push origin main --tags

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Publish each public workspace, skipping versions already on the
      # registry — makes failed runs safely re-runnable. Private workspaces
      # (conformance) are excluded by npm itself.
      - name: Publish
        run: |
          for dir in packages/core packages/client packages/server packages/cli; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip: $name@$version already published"
            else
              npm publish --workspace "$dir" --provenance --access public
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
